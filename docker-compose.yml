services:
  backend:
    build: ./monolith
    container_name: outland-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/outland.db
      OUTLAND_ROOT: /outland
      BINARIES_DIR: /data/binaries
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ${OUTLAND_ROOT_HOST}:/outland
      - backend-data:/data

  admin-ui:
    build: ./admin-ui
    container_name: outland-admin-ui
    restart: unless-stopped
    ports:
      - "${ADMIN_UI_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  backend-data:
